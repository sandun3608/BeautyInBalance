<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Beauty in Balance</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Elegant Centered Login Layout */
    body {
      background-color: #faf9f7;
      min-height: 100vh;
      margin: 0;
      font-family: var(--font-sans);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .login-container {
      margin: 140px 20px 100px;
      background: white;
      padding: 50px 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
      width: 100%;
      max-width: 400px;
      text-align: center;
      position: relative;
    }

    .login-container h1 {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 500;
      color: var(--brown);
      margin-bottom: 5px;
    }

    .login-container p {
      color: #777;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 14px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-family: var(--font-sans);
      font-size: 15px;
      transition: border-color 0.3s;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .login-btn {
      width: 100%;
      background-color: var(--brown);
      color: white;
      border: none;
      padding: 16px;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.05em;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 10px;
    }

    .login-btn:hover {
      background-color: var(--gold);
    }

    .error-msg {
      color: #d32f2f;
      font-size: 14px;
      margin-top: 15px;
      display: none;
    }

    .back-home {
      display: inline-block;
      margin-top: 25px;
      color: #777;
      font-size: 14px;
      text-decoration: none;
      transition: color 0.3s;
    }

    .back-home:hover {
      color: var(--gold);
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header" id="site-header">
    <nav class="nav-wrap">
      <!-- Left -->
      <div class="nav-left">
        <button class="ic-btn ham-btn" id="ham-open" aria-label="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            <span class="ic-label mobile-only">Menu</span>
        </button>
      </div>

      <!-- Center: Logo -->
      <a href="index.html" class="site-logo">Beauty in Balance</a>

      <!-- Right: Search + Account + Cart -->
      <div class="nav-icons">
        <button class="ic-btn mobile-hidden" id="search-open" aria-label="Search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
            <span class="ic-label mobile-only">Search</span>
        </button>

        <button class="ic-btn cart-ic" id="cart-open" aria-label="Cart">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
            <span class="cart-badge">0</span>
            <span class="ic-label mobile-only">Bag</span>
        </button>
      </div>
    </nav>

    <!-- Mobile Top Search Row -->
    <div class="mobile-search-bar mobile-only" id="mobile-search-bar">
      <div class="m-search-inner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
        <input type="search" placeholder="Search for products..." id="m-search-inp-top">
      </div>
    </div>
  </header>

  <div class="overlay" id="overlay"></div>

  <!-- ===== MOBILE DRAWER ===== -->
  <div class="mobile-drawer" id="mobile-drawer">
    <div class="drawer-top" style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05);">
       <span class="site-logo" style="font-size:20px;">Beauty in Balance</span>
       <button class="ic-btn" id="ham-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <ul class="mobile-nav" style="padding: 40px 20px; display: flex; flex-direction: column; gap: 20px;">
      <li><a href="index.html" style="font-size: 1.2rem; font-weight: 500; color: var(--brown);">Home</a></li>
      <li><a href="shop.html" style="font-size: 1.2rem; font-weight: 500; color: var(--brown);">Shop All</a></li>
      <li><a href="about.html" style="font-size: 1.2rem; font-weight: 500; color: var(--brown);">Our Story</a></li>
      <li><a href="contact.html" style="font-size: 1.2rem; font-weight: 500; color: var(--brown);">Contact Us</a></li>
      <li><a href="policies.html" style="font-size: 1.2rem; font-weight: 500; color: var(--brown);">Policies</a></li>
    </ul>
  </div>

  <!-- ===== CART DRAWER ===== -->
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-head" style="padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(0,0,0,0.05);">
      <h3>Bag (0)</h3>
      <button class="ic-btn" id="cart-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="cart-empty" style="padding: 50px 20px; text-align: center;">
      <p>Your bag is currently empty.</p>
    </div>
  </div>

  <!-- ===== MOBILE BOTTOM NAV (APP STYLE) ===== -->
  <div class="mobile-bottom-nav-v2">
    <a href="index.html" class="mbn-item" id="mbn-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/></svg>
      <span>Home</span>
    </a>
    <a href="shop.html" class="mbn-item" id="mbn-shop">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>
      <span>Shop</span>
    </a>
    <a href="https://wa.me/94719152136" target="_blank" class="mbn-item" id="mbn-wa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 11-7.6-11.2c4.6 0 8.3 3.7 8.5 8.3z"/><path d="M16 11l-3 3-3-3"/></svg>
      <span>WhatsApp</span>
    </a>
    <button class="mbn-item" id="mbn-cart-v2" onclick="document.getElementById('cart-open').click()">
      <div class="mbn-cart-wrap" style="position: relative;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge mbn-badge">0</span>
      </div>
      <span>Bag</span>
    </button>
  </div>

  <div class="login-container">
    <h1>Login</h1>
    <p>Sign in to access your dashboard</p>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="admin@beauty.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>

      <div class="error-msg" id="error-box"></div>

      <button type="submit" class="login-btn" id="login-btn">Sign In</button>
    </form>

    <a href="register.html" class="back-home" style="display: block; margin-top: 15px;">New customer? Create an account</a>
    <a href="index.html" class="back-home">← Return to Storefront</a>
  </div>

  <!-- Notification Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Preview Environment Badge -->
  <div class="preview-badge" id="preview-badge" style="display: none;">
    <div class="preview-dot"></div>
    Preview System Online
  </div>

  <script src="config.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const overlay = $('overlay');

    window.addEventListener('scroll', () => {
      $('site-header')?.classList.toggle('scrolled', window.scrollY > 50);
    });

    $('ham-open')?.addEventListener('click', () => { 
      document.getElementById('mobile-drawer').classList.add('open'); 
      overlay.classList.add('show'); 
      const mBar = $('mobile-search-bar');
      if(mBar) mBar.classList.add('hide-search');
    });

    $('cart-open')?.addEventListener('click', () => { 
      document.getElementById('cart-drawer').classList.add('open'); 
      overlay.classList.add('show'); 
    });
    
    function closeAll() {
      document.getElementById('mobile-drawer')?.classList.remove('open');
      document.getElementById('cart-drawer')?.classList.remove('open');
      overlay.classList.remove('show');
      const mBar = $('mobile-search-bar');
      if (mBar && window.scrollY <= 100) mBar.classList.remove('hide-search');
    }
    
    $('ham-close')?.addEventListener('click', closeAll);
    $('cart-close')?.addEventListener('click', closeAll);
    overlay.addEventListener('click', closeAll);

    // Mobile Search Bar Scroll Effect
    let lastScrollTop = 0;
    const mSearchBar = $('mobile-search-bar');
    window.addEventListener('scroll', function() {
      let st = window.pageYOffset || document.documentElement.scrollTop;
      if (st > 100) {
        if (st > lastScrollTop) {
          if(mSearchBar) mSearchBar.classList.add('hide-search');
        } else {
          if(mSearchBar) mSearchBar.classList.remove('hide-search');
        }
      } else {
        if(mSearchBar) mSearchBar.classList.remove('hide-search');
      }
      lastScrollTop = st;
    });

    (function forceBottomNav() {
      const nav = document.querySelector('.mobile-bottom-nav-v2');
      if (nav) {
        nav.style.display = 'grid';
        nav.style.visibility = 'visible';
        nav.style.opacity = '1';
      }
    })();

    const loginForm = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const errorBox = document.getElementById('error-box');
    const loginBtn = document.getElementById('login-btn');
    const toastContainer = document.getElementById('toast-container');
    const previewBadge = document.getElementById('preview-badge');

    // Show Preview Badge if on Render/Vercel
    if (window.location.hostname.includes('render') || window.location.hostname.includes('vercel')) {
        previewBadge.style.display = 'flex';
    }

    function showToast(title, message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
            <div class="toast-icon">${type === 'success' ? '✓' : '✕'}</div>
            <div class="toast-content">
                <div class="toast-title">${title}</div>
                <div class="toast-message">${message}</div>
            </div>
        `;
        toastContainer.appendChild(toast);
        
        // Trigger animation
        setTimeout(() => toast.classList.add('active'), 10);
        
        // Remove after 5 seconds
        setTimeout(() => {
            toast.classList.remove('active');
            setTimeout(() => toast.remove(), 400);
        }, 5000);
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      loginBtn.textContent = 'Authenticating...';
      loginBtn.disabled = true;

      try {
        const response = await fetch(`${BASE_URL}/users/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: emailInput.value,
            password: passwordInput.value
          })
        });

        const data = await response.json();

        if (response.ok) {
          showToast('Welcome Back', 'Redirecting to your dashboard...', 'success');
          
          localStorage.setItem('userToken', data.token);
          localStorage.setItem('userInfo', JSON.stringify({
            name: data.name,
            email: data.email,
            isAdmin: data.isAdmin
          }));

          setTimeout(() => {
            if (data.isAdmin) {
               window.location.href = 'admin.html';
            } else {
               window.location.href = 'index.html';
            }
          }, 1500);
        } else {
          showToast('Login Failed', data.message || 'Invalid email or password.', 'error');
        }

      } catch (err) {
        console.error(err);
        showToast('Connection Error', 'Backend server reached but failed to respond.', 'error');
      } finally {
        loginBtn.textContent = 'Sign In';
        loginBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
