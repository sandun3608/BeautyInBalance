<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | Beauty in Balance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --ebony: #1a1a1a;
            --gold: #d4af37;
            --cream: #faf7f2;
            --tan: #d2b48c;
            --text-muted: #666;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--cream);
            color: var(--ebony);
            font-family: 'DM Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        /* Abstract Background Elements */
        .bg-element {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
            border-radius: 50%;
        }

        .bg-1 {
            width: 500px;
            height: 500px;
            background: var(--tan);
            top: -10%;
            left: -10%;
            animation: move 20s infinite alternate;
        }

        .bg-2 {
            width: 400px;
            height: 400px;
            background: var(--gold);
            bottom: -5%;
            right: -5%;
            animation: move 15s infinite alternate-reverse;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(10%, 10%); }
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            transform: translateY(0);
            animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--ebony);
            font-weight: 700;
        }

        .divider {
            width: 60px;
            height: 2px;
            background: var(--gold);
            margin: 20px auto;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-weight: 500;
        }

        .contact-item {
            color: var(--ebony);
            text-decoration: none;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .contact-item svg {
            width: 18px;
            color: var(--gold);
        }

        .contact-item:hover {
            color: var(--gold);
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            background: var(--ebony);
            color: white;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 25px;
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(26, 26, 26, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(26, 26, 26, 0); }
            100% { box-shadow: 0 0 0 0 rgba(26, 26, 26, 0); }
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .container {
                margin: 20px;
                padding: 30px 20px;
            }
            .logo { font-size: 1.8rem; }
            h1 { font-size: 1.5rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-element bg-1"></div>
    <div class="bg-element bg-2"></div>

    <div class="container">
        <div class="status-badge">REFINING YOUR EXPERIENCE</div>
        <div class="logo">Beauty in Balance</div>
        <div class="divider"></div>
        <h1>Under Maintenance</h1>
        <p>
            We are currently updating our boutique to bring you a more seamless shopping experience. 
            We'll be back online shortly. Thank you for your patience!
        </p>

        <div class="contact-info">
            <a href="tel:+94719152136" class="contact-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                +94 71 915 2136
            </a>
            <a href="mailto:info@beautyinbalance.lk" class="contact-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                info@beautyinbalance.lk
            </a>
        </div>
    </div>
</body>
</html>
