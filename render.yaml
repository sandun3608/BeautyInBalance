previews:
  generation: automatic
  expireAfterDays: 7

services:
  # --- BACKEND SERVICE (Serves both API and Frontend) ---
  - type: web
    name: BeautyInBalance
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_VERSION
        value: 20.0.0

  # --- FRONTEND SERVICE (Optional, but good for static performance) ---
  - type: static
    name: BeautyInBalance-Frontend
    runtime: static
    buildCommand: "" 
    publishPath: "." 
    envVars:
      - key: GLOBAL_API_URL
        value: https://beautyinbalance.onrender.com
