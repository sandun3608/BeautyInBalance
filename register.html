<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Beauty in Balance</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=55" />
  <style>
    /* Elegant Centered Register Layout */
    body {
      background-color: #faf9f7;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      font-family: var(--font-sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-y: auto !important;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .register-container {
      margin: 60px auto;
      background: white;
      padding: 36px 28px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
      width: calc(100% - 40px);
      max-width: 450px;

      text-align: center;
      position: relative;
      box-sizing: border-box;
    }

    @media (max-width: 600px) {
      .register-container {
        margin: 20px 12px 40px;
        padding: 28px 20px;
        border-radius: 10px;
      }
    }


    .register-container h1 {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 500;
      color: var(--brown);
      margin-bottom: 5px;
    }

    .register-container p {
      color: #777;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-family: var(--font-sans);
      font-size: 14px;
      transition: border-color 0.3s;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
    }

    .register-btn {
      width: 100%;
      background-color: var(--brown);
      color: white;
      border: none;
      padding: 14px;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.05em;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.3s;
      margin-top: 10px;
    }

    .register-btn:hover {
      background-color: var(--gold);
    }

    .error-msg {
      color: #d32f2f;
      font-size: 14px;
      margin-top: 15px;
      display: none;
    }

    .success-msg {
      color: #2e7d32;
      font-size: 14px;
      margin-top: 15px;
      display: none;
    }

    .switch-auth {
      display: inline-block;
      margin-top: 20px;
      color: #777;
      font-size: 14px;
      text-decoration: none;
      transition: color 0.3s;
    }

    .switch-auth:hover {
      color: var(--gold);
    }
  </style>
</head>
<body>


  <div class="register-container">
    <h1>Create Account</h1>
    <p>Join Beauty in Balance for a curated skin journey</p>

    <form id="register-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="john@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" required />
      </div>

      <div class="error-msg" id="error-box"></div>
      <div class="success-msg" id="success-box">Account created successfully! Redirecting...</div>

      <button type="submit" class="register-btn" id="register-btn">Sign Up</button>
    </form>

    <a href="login.html" class="switch-auth">Already have an account? Login here</a>
    <br>
    <a href="index.html" class="switch-auth" style="margin-top: 10px; font-size: 12px;">← Return to Storefront</a>
  </div>

  <script src="config.js?v=16"></script>
  <script>
    const registerForm = document.getElementById('register-form');
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const errorBox = document.getElementById('error-box');
    const successBox = document.getElementById('success-box');
    const registerBtn = document.getElementById('register-btn');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      errorBox.style.display = 'none';
      successBox.style.display = 'none';

      if (passwordInput.value !== confirmPasswordInput.value) {
        errorBox.textContent = 'Passwords do not match.';
        errorBox.style.display = 'block';
        return;
      }

      registerBtn.textContent = 'Creating Account...';
      registerBtn.disabled = true;

      try {
        const response = await fetch(`${BASE_URL}/users/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: nameInput.value,
            email: emailInput.value,
            password: passwordInput.value
          })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('userToken', data.token);
          localStorage.setItem('userInfo', JSON.stringify({
            _id: data._id,
            name: data.name,
            email: data.email,
            isAdmin: data.isAdmin,
            avatar: data.avatar || ''
          }));

          document.querySelector('.register-container').innerHTML = `
            <div style="text-align: center; padding: 20px 0;">
              <div style="width: 80px; height: 80px; background: #10b981; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); animation: scaleIn 0.5s ease-out;">✓</div>
              <h1 style="font-family: var(--font-serif); font-size: 32px; color: var(--brown); margin-bottom: 10px;">Sign Up Successful!</h1>
              <p style="color: #666; font-size: 16px; margin-bottom: 30px;">Welcome to Beauty in Balance, ${data.name.split(' ')[0]}!</p>
              <div style="width: 40px; height: 40px; border: 3px solid #f3f3f3; border-top: 3px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
              <p style="color: #999; font-size: 14px;">Redirecting to Home Page...</p>
              <style>
                @keyframes scaleIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
                @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
              </style>
            </div>
          `;

          setTimeout(() => {
            window.location.href = 'index.html'; 
          }, 3000);
        } else {
          errorBox.textContent = data.message || 'Registration failed.';
          errorBox.style.display = 'block';
        }

      } catch (err) {
        console.error(err);
        errorBox.textContent = "Cannot connect to server.";
        errorBox.style.display = 'block';
      } finally {
        registerBtn.textContent = 'Sign Up';
        registerBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
