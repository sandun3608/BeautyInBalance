<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Beauty in Balance</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --brown: #2D1B12;
      --gold: #b58646;
      --font-serif: 'Cormorant Garamond', serif;
      --font-sans: 'DM Sans', sans-serif;
    }

    body {
      min-height: 100vh;
      background-color: #faf9f7;
      font-family: var(--font-sans);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .register-card {
      width: 100%;
      max-width: 450px;
      margin: 20px;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
      text-align: center;
    }

    .brand h1 {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 500;
      color: var(--brown);
      margin-bottom: 5px;
    }

    .brand p {
      color: #777;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .form-group input {
      width: 100%;
      padding: 13px 15px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-family: var(--font-sans);
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(181, 134, 70, 0.1);
    }

    .register-btn {
      width: 100%;
      background-color: var(--brown);
      color: white;
      border: none;
      padding: 16px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .register-btn:hover {
      background-color: var(--gold);
      transform: translateY(-1px);
    }

    .register-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .bottom-links {
      margin-top: 25px;
      font-size: 14px;
      color: #777;
    }

    .bottom-links a {
      color: var(--brown);
      font-weight: 600;
      text-decoration: none;
      transition: color 0.3s;
    }

    .bottom-links a:hover {
      color: var(--gold);
    }

    /* -- Toast Styles -- */
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast { background: #1e1209; color: white; padding: 14px 18px; border-radius: 10px; display: flex; align-items: center; gap: 12px; transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); min-width: 280px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .toast.active { transform: translateX(0); }
    .toast.success .toast-icon { color: #4ade80; }
    .toast.error .toast-icon { color: #f87171; }
    .toast-icon { font-size: 20px; font-weight: 700; }
    .toast-title { font-weight: 700; font-size: 14px; }
    .toast-message { font-size: 12px; opacity: 0.7; }
  </style>
</head>
<body>

  <div class="register-card">
    <div class="brand">
      <h1>Create Account</h1>
      <p>Join Beauty in Balance for a curated skin journey</p>
    </div>

    <form id="register-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="john@example.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" required />
      </div>

      <button type="submit" class="register-btn" id="register-btn">Sign Up</button>
    </form>

    <div class="bottom-links">
      Already have an account? <a href="login.html">Login here</a>
      <br><br>
      <a href="index.html" style="font-size: 12px; opacity: 0.6;">← Return to Storefront</a>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="config.js?v=17"></script>
  <script>
    const $ = id => document.getElementById(id);
    
    // Toast helper
    function showToast(title, message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <div class="toast-icon">${type === 'success' ? '✓' : '✕'}</div>
        <div class="toast-content">
          <div class="toast-title">${title}</div>
          <div class="toast-message">${message}</div>
        </div>`;
      container.appendChild(toast);
      setTimeout(() => toast.classList.add('active'), 10);
      setTimeout(() => {
        toast.classList.remove('active');
        setTimeout(() => toast.remove(), 400);
      }, 5000);
    }

    const registerForm = $('register-form');
    const registerBtn = $('register-btn');

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = $('name').value;
      const email = $('email').value;
      const password = $('password').value;
      const confirmPassword = $('confirmPassword').value;

      if (password !== confirmPassword) {
        showToast('Password Error', 'Passwords do not match.', 'error');
        return;
      }

      registerBtn.textContent = 'Creating Account...';
      registerBtn.disabled = true;

      try {
        // Use the global BASE_URL from config.js
        const apiUrl = window.BASE_URL || 'https://beautyinbalance.onrender.com/api';
        
        const response = await fetch(`${apiUrl}/users/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (response.ok) {
          showToast('Success', 'Account created! Redirecting...', 'success');
          localStorage.setItem('userToken', data.token);
          localStorage.setItem('userInfo', JSON.stringify({
            _id: data._id,
            name: data.name,
            email: data.email,
            isAdmin: data.isAdmin
          }));

          setTimeout(() => {
            window.location.href = 'account.html';
          }, 1500);
        } else {
          showToast('Registration Failed', data.message || 'Check your details.', 'error');
        }

      } catch (err) {
        console.error("Fetch error:", err);
        showToast('Connection Error', 'Could not reach the server. Please check your internet.', 'error');
      } finally {
        registerBtn.textContent = 'Sign Up';
        registerBtn.disabled = false;
      }
    });
  </script>

</body>
</html>
