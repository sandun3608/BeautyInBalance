<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category | Beauty in Balance</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ── PREMIUM CATEGORY OVERRIDES ── */
    :root {
      --editorial-bg: #fdfaf7;
      --editorial-border: #f2f2f2;
    }

    body { background: #fff; }

    .cat-hero { 
      padding: 160px 5% 100px; 
      background: var(--editorial-bg); 
      text-align: center; 
      border-bottom: 1px solid var(--editorial-border);
    }
    .cat-hero h4 { 
      color: var(--gold); 
      text-transform: uppercase; 
      letter-spacing: 4px; 
      font-size: 0.8rem; 
      margin-bottom: 25px; 
      font-weight: 700; 
    }
    .cat-hero h1 { 
      font-family: var(--font-serif); 
      font-size: clamp(45px, 7vw, 90px); 
      color: #1a1a1a; 
      margin-bottom: 35px; 
      line-height: 1;
      font-weight: 700;
      letter-spacing: -2px;
    }
    .cat-hero p { 
      max-width: 750px; 
      margin: 0 auto; 
      font-size: 1.2rem; 
      line-height: 1.8; 
      color: #555; 
      font-weight: 400;
    }

    .cat-content { 
      padding: 100px 5%; 
      max-width: 1400px; 
      margin: 0 auto; 
    }

    /* Educational Section */
    .exclusive-edu {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 100px;
      margin-bottom: 120px;
    }

    .edu-left h2 {
      font-family: var(--font-serif);
      font-size: 3rem;
      color: #1a1a1a;
      margin-bottom: 40px;
      position: relative;
    }
    .edu-left h2::after {
      content: '';
      position: absolute;
      bottom: -15px;
      left: 0;
      width: 60px;
      height: 3px;
      background: var(--gold);
    }

    .benefit-item {
      margin-bottom: 45px;
      display: flex;
      gap: 30px;
    }
    .benefit-num {
      font-family: var(--font-serif);
      font-size: 2.5rem;
      color: #e8e8e8;
      font-weight: 700;
      line-height: 1;
    }
    .benefit-info h5 {
      font-size: 1.25rem;
      color: #1a1a1a;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .benefit-info p {
      color: #666;
      line-height: 1.7;
      font-size: 1.05rem;
    }

    .routine-sidebar {
      background: #1a3c34; /* Forest Green */
      color: #fff;
      padding: 60px 45px;
      border-radius: 40px;
      position: sticky;
      top: 120px;
      box-shadow: 0 30px 60px rgba(26,60,52,0.15);
    }
    .routine-sidebar h4 {
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 0.8rem;
      opacity: 0.7;
      margin-bottom: 20px;
    }
    .routine-sidebar h2 {
      font-family: var(--font-serif);
      font-size: 2.2rem;
      margin-bottom: 40px;
    }

    .step-item {
      margin-bottom: 35px;
      border-left: 1px solid rgba(255,255,255,0.1);
      padding-left: 30px;
    }
    .step-tag {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .step-item p {
      font-size: 1.05rem;
      line-height: 1.6;
      opacity: 0.9;
    }

    /* Products Grid */
    .products-header {
      text-align: center;
      margin-bottom: 60px;
    }
    .products-header span {
      font-family: var(--font-fancy);
      color: var(--gold);
      font-size: 2rem;
      display: block;
      margin-bottom: 10px;
    }
    .products-header h2 {
      font-family: var(--font-serif);
      font-size: 3.5rem;
      color: #1a1a1a;
    }

    .premium-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
    }

    .premium-card {
      background: #fff;
      border: 1px solid #f2f2f2;
      padding: 30px;
      border-radius: 30px;
      transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
      cursor: pointer;
      position: relative;
    }
    .premium-card:hover {
      transform: translateY(-15px);
      box-shadow: 0 25px 50px rgba(0,0,0,0.06);
      border-color: var(--gold);
    }
    .pc-image {
      height: 280px;
      background: #fdfaf7;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 25px;
      transition: 0.5s;
    }
    .pc-image img {
      max-width: 85%;
      max-height: 85%;
      object-fit: contain;
    }
    .premium-card:hover .pc-image { background: white; }

    .pc-details h3 {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      color: #1a1a1a;
      margin-bottom: 10px;
    }
    .pc-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }
    .pc-price {
      font-size: 1.25rem;
      font-weight: 800;
      color: #1a3c34;
    }
    .pc-buy {
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      transition: 0.3s;
    }
    .premium-card:hover .pc-buy { background: var(--gold); color: #fff; }

    @media (max-width: 1100px) {
      .premium-grid { grid-template-columns: repeat(2, 1fr); }
      .exclusive-edu { grid-template-columns: 1fr; gap: 60px; }
      .routine-sidebar { position: static; }
    }
    @media (max-width: 600px) {
      .premium-grid { grid-template-columns: 1fr; }
      .cat-hero h1 { font-size: 3.5rem; }
      .edu-left h2 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

  <!-- Header is shared from styles.css/common -->
  <header class="site-header" id="site-header">
    <nav class="nav-wrap">
      <ul class="nav-main">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <a href="index.html" class="site-logo">Beauty in Balance</a>
      <div class="nav-icons">
        <a href="login.html" class="ic-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></a>
        <button class="ic-btn cart-ic" id="cart-open"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="cart-badge">0</span></button>
      </div>
    </nav>
  </header>

  <main>
    <section class="cat-hero">
      <h4 id="cat-subtitle">Loading Category...</h4>
      <h1 id="cat-title">Expert Skincare</h1>
      <p id="cat-desc">A deep dive into medical-grade results and authentic formulations.</p>
    </section>

    <div class="cat-content">
      <!-- Expert Education -->
      <section class="exclusive-edu">
        <div class="edu-left">
          <h2>Scientific Proof & Benefits</h2>
          <div id="benefit-list"></div>
        </div>
        <div class="edu-right">
          <div class="routine-sidebar">
            <h4>Application Ritual</h4>
            <h2 id="usage-title">The Perfect Routine</h2>
            <div id="usage-list"></div>
          </div>
        </div>
      </section>

      <!-- Products Grid -->
      <section class="cat-products">
        <div class="products-header">
          <span>Curated Selection</span>
          <h2 id="grid-title">Filtered For You</h2>
        </div>
        <div class="premium-grid" id="product-grid"></div>
      </section>
    </div>
  </main>

  <footer class="site-footer" id="site-footer">
    <!-- Common Footer Placeholder -->
  </footer>

  <script src="category-data.js"></script>
  <script src="products.js"></script>
  <script>
    const $ = id => document.getElementById(id);

    // Get URL Param
    const params = new URLSearchParams(window.location.search);
    const catId = params.get('cat') || 'cleansers';

    const data = categories[catId];
    if (data) {
      document.title = `${data.subtitle} | Beauty in Balance`;
      $('cat-subtitle').innerText = data.subtitle;
      $('cat-title').innerText = data.title;
      $('cat-desc').innerText = data.description;
      $('usage-title').innerText = `How to Use ${data.subtitle}`;
      $('grid-title').innerText = `Best in ${data.subtitle}`;

      // Render Benefits
      $('benefit-list').innerHTML = data.benefits.map((b, i) => `
        <div class="benefit-item">
          <div class="benefit-num">0${i+1}</div>
          <div class="benefit-info">
            <h5>${b.title}</h5>
            <p>${b.desc}</p>
          </div>
        </div>
      `).join('');

      // Render Routine Steps
      $('usage-list').innerHTML = data.usage.map(u => `
        <div class="step-item">
          <span class="step-tag">${u.step}</span>
          <p>${u.desc}</p>
        </div>
      `).join('');
    }

    // Filter and Render Products
    window.renderCategoryProducts = () => {
      const allProducts = window.productsData || [];
      // Flexible matching: check filter tag or category field or name
      const filtered = allProducts.filter(p => {
        const filterMatch = (p.filter && p.filter.toLowerCase() === catId.toLowerCase());
        const catMatch = (p.cat_type && p.cat_type.toLowerCase() === catId.toLowerCase());
        // Simple name search if both fail
        const nameKeywords = data ? data.subtitle.split(' ')[0].toLowerCase() : catId;
        const nameMatch = p.name.toLowerCase().includes(nameKeywords);
        return filterMatch || catMatch || (filterMatch === undefined && nameMatch);
      });

      $('product-grid').innerHTML = filtered.map(p => `
        <div class="premium-card" onclick="window.location.href='product.html?id=${p.id}'">
          <div class="pc-image">
            <img src="${p.img}" alt="${p.name}">
          </div>
          <div class="pc-details">
            <h3>${p.name}</h3>
            <div class="pc-footer">
              <span class="pc-price">Rs. ${p.price.toLocaleString()}</span>
              <button class="pc-buy">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                  <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      `).join('');

      if (filtered.length === 0) {
        $('product-grid').innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 100px; opacity:0.5;">No products found in this category yet.</div>`;
      }
    };

    // Initial Trigger
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(renderCategoryProducts, 500); 
    });

    window.addEventListener('scroll', () => {
      $('site-header').classList.toggle('scrolled', window.scrollY > 50);
    });
  </script>
</body>
</html>
